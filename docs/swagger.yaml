openapi: 3.0.3
info:
  title: Subscription API
  version: 1.0.0
  description: API для управления подписками пользователей на сервисы.
servers:
  - url: /api/v1
    description: base (v1)

tags:
  - name: Health
    description: Проверки состояния сервиса
  - name: Subscriptions
    description: Управление подписками пользователей

paths:
  /liveness:
    get:
      tags:
        - Health
      summary: Проверка доступности (Liveness probe)
      responses:
        '200':
          description: Сервис работает
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /readiness:
    get:
      tags:
        - Health
      summary: Проверка готовности (Readiness probe)
      responses:
        '200':
          description: Сервис готов принимать запросы
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /subscriptions:
    post:
      tags:
        - Subscriptions
      summary: Создать новую подписку
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest'
      responses:
        '201':
          description: Подписка успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /subscriptions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID подписки
        schema:
          type: integer
          format: int64
          example: 1
    get:
      tags:
        - Subscriptions
      summary: Получить подписку по ID
      responses:
        '200':
          description: Данные подписки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Subscriptions
      summary: Обновить данные подписки
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest'
      responses:
        '204':
          description: Подписка успешно обновлена
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Subscriptions
      summary: Удалить подписку
      responses:
        '204':
          description: Подписка успешно удалена
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /subscriptions/list:
    get:
      tags:
        - Subscriptions
      summary: Получить список подписок пользователя
      parameters:
        - name: user_id
          in: query
          required: true
          description: UUID пользователя
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Список подписок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /subscriptions/total-cost:
    get:
      tags:
        - Subscriptions
      summary: Рассчитать общую стоимость подписок за период
      parameters:
        - name: user_id
          in: query
          required: true
          description: UUID пользователя
          schema:
            type: string
            format: uuid
        - name: period_start
          in: query
          required: true
          description: Начало периода в формате MM-YYYY
          schema:
            type: string
            example: "01-2023"
        - name: period_end
          in: query
          required: true
          description: Конец периода в формате MM-YYYY
          schema:
            type: string
            example: "12-2023"
        - name: service_name
          in: query
          required: false
          description: Фильтр по названию сервиса (опционально)
          schema:
            type: string
      responses:
        '200':
          description: Общая стоимость рассчитана
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_cost:
                    type: integer
                    format: int64
                    description: Сумма в рублях
                    example: 5000
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    SubscriptionRequest:
      type: object
      required:
        - service_name
        - price
        - user_id
        - start_date
      properties:
        id:
          type: integer
          format: int64
          description: Может игнорироваться при создании, используется в маппинге
        service_name:
          type: string
          example: "Yandex Plus"
        price:
          type: integer
          description: Стоимость в рублях
          example: 299
        user_id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        start_date:
          type: string
          description: Дата начала подписки в формате MM-YYYY
          example: "05-2023"
        end_date:
          type: string
          description: Дата окончания подписки в формате MM-YYYY (опционально)
          example: "05-2024"
          nullable: true

    Subscription:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        service_name:
          type: string
          example: "Yandex Plus"
        price:
          type: integer
          description: Стоимость в рублях
          example: 299
        user_id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        start_date:
          type: string
          format: date-time
          description: Стандартный вывод time.Time в формате RFC3339
          example: "2023-05-01T00:00:00Z"
        end_date:
          type: string
          format: date-time
          example: "2024-05-01T00:00:00Z"
          nullable: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "invalid request body"

  responses:
    BadRequest:
      description: Неверный запрос (ошибка валидации данных или парсинга)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Сервис недоступен (например, база данных не отвечает)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'